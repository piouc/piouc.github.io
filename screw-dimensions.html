<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メートルネジ寸法</title>
<style>
:root {
  --background-color: #ffffff;
  --surface-color: #f5f5f5;
  --border-color: #cccccc;
  --text-color: #222222;
  --text-muted-color: #666666;
  --accent-color: #333333;
  --tab-active-color: #e8e8e8;
  --tab-hover-color: #f0f0f0;
}

* {
  margin: 0;
  padding: 0;
}

body {
  font-family: "SF Mono", "Cascadia Code", monospace;
  background: var(--background-color);
  color: var(--text-color);
  font-size: 0.8125rem;
  line-height: 1.4;
}

h1 {
  font-size: 1rem;
  font-weight: 600;
  padding: 0.75rem;
  border-bottom: 1px solid var(--border-color);
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border-color);

  & button {
    background: none;
    border: none;
    color: var(--text-muted-color);
    padding: 0.5rem 0.875rem;
    cursor: pointer;
    font: inherit;
    border-bottom: 0.125rem solid transparent;

    &:hover {
      background: var(--tab-hover-color);
    }

    &.active {
      color: var(--accent-color);
      border-bottom-color: var(--accent-color);
    }
  }
}

.subtabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  padding-inline: 0.75rem;

  & button {
    background: none;
    border: 1px solid var(--border-color);
    color: var(--text-muted-color);
    padding: 0.1875rem 0.625rem;
    cursor: pointer;
    font: inherit;
    font-size: 0.75rem;

    border-radius: 0.25rem;

    &.active {
      background: var(--tab-active-color);
      color: var(--accent-color);
    }
  }
}

.panel {
  display: none;
  margin-top: 0.75rem;
  &.active {
    display: block;
  }
}

.table-wrap {
  overflow-x: auto;
  padding-inline: 0.75rem;
}

table {
  border-collapse: collapse;
}

th,
td {
  padding: 0.3125rem 0.625rem;
  border: 1px solid var(--border-color);
  text-align: center;
  white-space: nowrap;
}

th {
  background: var(--surface-color);
  font-weight: 600;
  position: sticky;
  top: 0;
}

tr:hover td {
  background: var(--surface-color);
}

td:first-child,
th:first-child {
  position: sticky;
  left: 0;
  background: var(--background-color);
  z-index: 1;
  font-weight: 600;
}

tr:hover td:first-child {
  background: var(--surface-color);
}

.note {
  padding: 0.5rem 1rem;
  color: var(--text-muted-color);
  font-size: 0.6875rem;
}
</style>
</head>
<body>
<h1>メートルネジ寸法</h1>
<div class="tabs" id="mainTabs"></div>
<div id="panels"></div>
<script>
const sizes = ["M1","M1.2","M1.4","M1.6","M1.8","M2","M2.5","M3","M4","M5","M6","M8","M10","M12","M14","M16","M18","M20","M22","M24","M27","M30"]

const pitchCoarse = [0.25,0.25,0.3,0.35,0.35,0.4,0.45,0.5,0.7,0.8,1.0,1.25,1.5,1.75,2.0,2.0,2.5,2.5,2.5,3.0,3.0,3.5]

const pitchFine = [
  [],[],[],[],[],
  [],[],[0.35],[0.5],[0.5],
  [0.75],[1.0,0.75],[1.25,1.0,0.75],[1.5,1.25,1.0],[1.5,1.25,1.0],
  [1.5,1.0],[2.0,1.5,1.0],[2.0,1.5,1.0],[2.0,1.5,1.0],[2.0,1.5,1.0],
  [2.0,1.5,1.0],[3.0,2.0,1.5]
]

const clearanceHoles = {
  h1: [1.1,1.3,1.5,1.7,1.9,2.2,2.7,3.2,4.3,5.3,6.4,8.4,10.5,13.0,15.0,17.0,19.0,21.0,23.0,25.0,28.0,31.0],
  h2: [1.2,1.4,1.6,1.8,2.0,2.4,2.9,3.4,4.5,5.5,6.6,9.0,11.0,13.5,15.5,17.5,20.0,22.0,24.0,26.0,30.0,33.0],
  h3: [1.3,1.5,1.8,2.0,2.2,2.6,3.1,3.6,4.8,5.8,7.0,10.0,12.0,14.5,16.5,18.5,21.0,24.0,26.0,28.0,32.0,35.0]
}

const tapDrillCoarse = [0.75,0.95,1.1,1.25,1.45,1.6,2.05,2.5,3.3,4.2,5.0,6.8,8.5,10.2,12.0,14.0,15.5,17.5,19.5,21.0,24.0,26.5]

const tapDrillFine = [
  [],[],[],[],[],
  [],[],[2.65],[3.5],[4.5],
  [5.25],[7.0,7.25],[8.75,9.0,9.25],[10.5,10.8,11.0],[12.5,12.8,13.0],
  [14.5,15.0],[16.0,16.5,17.0],[18.0,18.5,19.0],[20.0,20.5,21.0],[22.0,22.5,23.0],
  [25.0,25.5,26.0],[27.0,28.0,28.5]
]

const nutData = {
  s:  ["-","-","-",3.2,"-",4.0,5.0,5.5,7.0,8.0,10.0,13.0,16.0,18.0,21.0,24.0,27.0,30.0,34.0,36.0,41.0,46.0],
  m1: ["-","-","-",1.3,"-",1.6,2.0,2.4,3.2,4.7,5.2,6.8,8.4,10.8,12.8,14.8,15.8,18.0,19.4,21.5,23.8,25.6],
  m2: ["-","-","-",1.0,"-",1.2,1.6,1.8,2.2,2.7,3.2,4.0,5.0,6.0,7.0,8.0,9.0,10.0,11.0,12.0,13.5,15.0],
  m3: ["-","-","-",1.0,"-",1.2,1.6,1.8,2.2,3.5,4.0,5.0,6.0,7.0,8.0,8.0,9.0,10.0,"-",12.0,"-",15.0]
}

const washerFlat = {
  id: ["-","-","-",1.7,"-",2.2,2.7,3.2,4.3,5.3,6.4,8.4,10.5,13.0,15.0,17.0,19.0,21.0,23.0,25.0,28.0,31.0],
  od: ["-","-","-",4.0,"-",5.0,6.5,7.0,9.0,10.0,12.0,16.0,20.0,24.0,28.0,30.0,34.0,37.0,39.0,44.0,50.0,56.0],
  t:  ["-","-","-",0.3,"-",0.3,0.5,0.5,0.8,1.0,1.6,1.6,2.0,2.5,2.5,3.0,3.0,3.0,3.0,4.0,4.0,4.0]
}

const washerSpring = {
  id: ["-","-","-","-","-",2.1,2.6,3.1,4.1,5.1,6.1,8.2,10.2,12.2,14.2,16.2,18.2,20.2,22.5,24.5,27.5,30.5],
  size:["-","-","-","-","-","0.5×0.9","0.6×1.2","0.8×1.4","0.9×1.6","1.2×2.2","1.6×3.0","2.0×4.0","2.5×5.0","3.0×6.0","3.0×6.0","3.5×7.0","3.5×7.0","4.0×8.0","4.0×8.0","5.0×10.0","5.0×10.0","6.0×12.0"]
}

const hexBolt = {
  s: ["-","-","-","-","-",4.0,5.0,5.5,7.0,8.0,10.0,13.0,16.0,18.0,21.0,24.0,27.0,30.0,34.0,36.0,41.0,46.0],
  k: ["-","-","-","-","-",1.4,1.7,2.0,2.8,3.5,4.0,5.3,6.4,7.5,8.8,10.0,11.5,12.5,14.0,15.0,17.0,18.7]
}

const capBolt = {
  dk:["-","-","-","-","-",3.8,4.5,5.5,7.0,8.5,10.0,13.0,16.0,18.0,21.0,24.0,27.0,30.0,33.0,36.0,40.0,45.0],
  k: ["-","-","-","-","-",2.0,2.5,3.0,4.0,5.0,6.0,8.0,10.0,12.0,14.0,16.0,18.0,20.0,22.0,24.0,27.0,30.0],
  hex:["-","-","-","-","-",1.5,2.0,2.5,3.0,4.0,5.0,6.0,8.0,10.0,12.0,14.0,14.0,17.0,17.0,19.0,19.0,22.0]
}

const panHead = {
  dk:["-","-","-",3.0,"-",4.0,5.0,6.0,8.0,10.0,12.0,16.0,20.0,24.0,"-","-","-","-","-","-","-","-"],
  k: ["-","-","-",1.0,"-",1.3,1.5,1.8,2.4,3.0,3.6,4.8,6.0,7.2,"-","-","-","-","-","-","-","-"]
}

const flatHeadPhillips = {
  dk:["-","-","-",3.0,"-",3.8,4.7,5.6,7.5,9.2,11.0,14.5,18.0,22.0,26.0,30.0,"-","-","-","-","-","-"],
  k: ["-","-","-",0.96,"-",1.2,1.5,1.65,2.2,2.5,3.0,4.0,5.0,6.0,7.0,8.0,"-","-","-","-","-","-"]
}

const flatHeadHex = {
  dk:["-","-","-","-","-",3.8,4.7,5.5,7.5,9.2,11.0,14.5,18.0,22.0,26.0,30.0,33.0,36.0,"-","-","-","-"],
  k: ["-","-","-","-","-",1.2,1.5,1.7,2.3,2.8,3.3,4.4,5.5,6.5,7.5,8.5,"-","-","-","-","-","-"],
  hex:["-","-","-","-","-",1.5,2.0,2.5,3.0,4.0,5.0,6.0,8.0,10.0,12.0,14.0,14.0,17.0,"-","-","-","-"]
}

const buttonHead = {
  dk:["-","-","-","-","-",3.5,4.5,5.7,7.6,9.5,10.5,14.0,17.5,21.0,24.5,28.0,31.5,35.0,"-","-","-","-"],
  k: ["-","-","-","-","-",1.3,1.5,1.65,2.2,2.75,3.3,4.4,5.5,6.6,7.7,8.8,9.9,11.0,"-","-","-","-"],
  hex:["-","-","-","-","-",1.3,1.5,2.0,2.5,3.0,4.0,5.0,6.0,8.0,10.0,12.0,14.0,14.0,"-","-","-","-"]
}

const trussHead = {
  dk:["-","-","-","-","-","-","-",6.0,8.0,10.0,12.0,16.0,20.0,24.0,"-","-","-","-","-","-","-","-"],
  k: ["-","-","-","-","-","-","-",1.2,1.4,1.8,2.2,2.8,3.6,4.2,"-","-","-","-","-","-","-","-"]
}

const counterbore = {
  d: ["-","-","-","-","-",4.4,5.4,6.5,8.0,9.5,11.0,14.5,17.5,20.0,23.0,26.0,30.0,33.0,36.0,40.0,44.0,50.0],
  t: ["-","-","-","-","-",2.0,2.5,3.0,4.0,5.0,6.0,8.0,10.0,12.0,14.0,16.0,18.0,20.0,22.0,24.0,27.0,30.0]
}

const countersink = {
  d: ["-","-","-",3.2,"-",4.0,5.0,6.0,8.0,9.6,11.5,15.0,18.5,22.5,26.5,30.5,"-","-","-","-","-","-"],
  angle: 90
}

const sections = [
  {id:"pitch",label:"ピッチ"},
  {id:"clearance",label:"貫通穴"},
  {id:"tap",label:"タップ下穴"},
  {id:"nut",label:"ナット"},
  {id:"washer",label:"ワッシャー"},
  {id:"head",label:"頭形状"},
  {id:"bore",label:"座ぐり/皿モミ"}
]

const mainTabs = document.getElementById("mainTabs")
const panels = document.getElementById("panels")

const makeTable = (headers, rows) => {
  let h = `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>`
  h += rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")
  return h + "</tbody></table>"
}

const renderPitch = () => {
  const coarseRows = sizes.map((s,i) => [s, pitchCoarse[i], tapDrillCoarse[i]])
  const fineRows = sizes.map((s,i) => {
    if (!pitchFine[i].length) return null
    return [s, pitchFine[i].join(" / ")]
  }).filter(Boolean)

  return `<div class="subtabs" data-group="pitch">
    <button class="active" data-sub="pitch-coarse">並目</button>
    <button data-sub="pitch-fine">細目</button>
  </div>
  <div class="panel active" id="pitch-coarse"><div class="table-wrap">
    ${makeTable(["呼び","ピッチ","タップ下穴径"], coarseRows)}
  </div><div class="note">JIS B 0205（並目ねじ）</div></div>
  <div class="panel" id="pitch-fine"><div class="table-wrap">
    ${makeTable(["呼び","ピッチ（細目）"], fineRows)}
  </div><div class="note">JIS B 0207（細目ねじ）</div></div>`
}

const renderClearance = () => {
  const rows = sizes.map((s,i) => [s, clearanceHoles.h1[i], clearanceHoles.h2[i], clearanceHoles.h3[i]])
  return `<div class="table-wrap">${makeTable(["呼び","1級(精)","2級(中)","3級(粗)"], rows)}</div>
  <div class="note">JIS B 1001 ボルト穴径（mm）</div>`
}

const renderTap = () => {
  const coarseRows = sizes.map((s,i) => [s, pitchCoarse[i], tapDrillCoarse[i]])
  const fineRows = sizes.map((s,i) => {
    if (!pitchFine[i].length) return null
    const drills = tapDrillFine[i]
    return [s, ...pitchFine[i].map((p,j) => `P${p}→φ${drills[j]}`)]
  }).filter(Boolean)
  const maxCols = Math.max(...fineRows.map(r => r.length))
  const fineHeaders = ["呼び", ...Array.from({length: maxCols - 1}, (_, i) => `細目${i + 1}`)]

  return `<div class="subtabs" data-group="tap">
    <button class="active" data-sub="tap-coarse">並目</button>
    <button data-sub="tap-fine">細目</button>
  </div>
  <div class="panel active" id="tap-coarse"><div class="table-wrap">
    ${makeTable(["呼び","ピッチ","下穴径"], coarseRows)}
  </div><div class="note">下穴径 ≈ 呼び径 − ピッチ（mm）</div></div>
  <div class="panel" id="tap-fine"><div class="table-wrap">
    ${makeTable(fineHeaders, fineRows.map(r => [...r, ...Array(maxCols - r.length).fill("-")]))}
  </div><div class="note">P=ピッチ、φ=下穴径（mm）</div></div>`
}

const renderNut = () => {
  const rows = sizes.map((s,i) => [s, nutData.s[i], nutData.m1[i], nutData.m2[i], nutData.m3[i]])
  return `<div class="table-wrap">${makeTable(["呼び","二面幅 s","1種 高さ","2種 高さ","3種 高さ"], rows)}</div>
  <div class="note">JIS B 1181 六角ナット（mm）</div>`
}

const renderWasher = () => {
  const flatRows = sizes.map((s,i) => [s, washerFlat.id[i], washerFlat.od[i], washerFlat.t[i]])
  const springRows = sizes.map((s,i) => [s, washerSpring.id[i], washerSpring.size[i]])
  return `<div class="subtabs" data-group="washer">
    <button class="active" data-sub="washer-flat">平ワッシャー</button>
    <button data-sub="washer-spring">ばね座金</button>
  </div>
  <div class="panel active" id="washer-flat"><div class="table-wrap">
    ${makeTable(["呼び","内径","外径","厚さ"], flatRows)}
  </div><div class="note">JIS B 1256 平座金（mm）</div></div>
  <div class="panel" id="washer-spring"><div class="table-wrap">
    ${makeTable(["呼び","内径","厚さ×幅"], springRows)}
  </div><div class="note">JIS B 1251 ばね座金（mm）</div></div>`
}

const renderHead = () => {
  return `<div class="subtabs" data-group="head">
    <button class="active" data-sub="head-hex">六角</button>
    <button data-sub="head-cap">キャップ</button>
    <button data-sub="head-button">ボタン</button>
    <button data-sub="head-flat-ph">皿(+)</button>
    <button data-sub="head-flat-hex">皿(六角穴)</button>
    <button data-sub="head-truss">トラス</button>
    <button data-sub="head-pan">なべ</button>
  </div>
  <div class="panel active" id="head-hex"><div class="table-wrap">
    ${makeTable(["呼び","二面幅 s","頭高さ k"], sizes.map((s,i) => [s, hexBolt.s[i], hexBolt.k[i]]))}
  </div><div class="note">JIS B 1180 六角ボルト（mm）</div></div>
  <div class="panel" id="head-cap"><div class="table-wrap">
    ${makeTable(["呼び","頭径 dk","頭高さ k","六角穴"], sizes.map((s,i) => [s, capBolt.dk[i], capBolt.k[i], capBolt.hex[i]]))}
  </div><div class="note">JIS B 1176 六角穴付きボルト（mm）</div></div>
  <div class="panel" id="head-button"><div class="table-wrap">
    ${makeTable(["呼び","頭径 dk","頭高さ k","六角穴"], sizes.map((s,i) => [s, buttonHead.dk[i], buttonHead.k[i], buttonHead.hex[i]]))}
  </div><div class="note">JIS B 1174 六角穴付きボタンボルト（mm）</div></div>
  <div class="panel" id="head-flat-ph"><div class="table-wrap">
    ${makeTable(["呼び","頭径 dk","頭高さ k"], sizes.map((s,i) => [s, flatHeadPhillips.dk[i], flatHeadPhillips.k[i]]))}
  </div><div class="note">JIS B 1111 十字穴付き皿小ねじ（mm）</div></div>
  <div class="panel" id="head-flat-hex"><div class="table-wrap">
    ${makeTable(["呼び","頭径 dk","頭高さ k","六角穴"], sizes.map((s,i) => [s, flatHeadHex.dk[i], flatHeadHex.k[i], flatHeadHex.hex[i]]))}
  </div><div class="note">JIS B 1194 六角穴付き皿ボルト（mm）</div></div>
  <div class="panel" id="head-truss"><div class="table-wrap">
    ${makeTable(["呼び","頭径 dk","頭高さ k"], sizes.map((s,i) => [s, trussHead.dk[i], trussHead.k[i]]))}
  </div><div class="note">JIS B 1111 トラス小ねじ（mm）</div></div>
  <div class="panel" id="head-pan"><div class="table-wrap">
    ${makeTable(["呼び","頭径 dk","頭高さ k"], sizes.map((s,i) => [s, panHead.dk[i], panHead.k[i]]))}
  </div><div class="note">JIS B 1111 なべ小ねじ（mm）</div></div>`
}

const renderBore = () => {
  const cbRows = sizes.map((s,i) => [s, capBolt.dk[i] !== "-" ? counterbore.d[i] : "-", capBolt.dk[i] !== "-" ? counterbore.t[i] : "-"])
  const csRows = sizes.map((s,i) => [s, countersink.d[i], countersink.d[i] !== "-" ? `${countersink.angle}°` : "-"])
  return `<div class="subtabs" data-group="bore">
    <button class="active" data-sub="bore-cb">座ぐり</button>
    <button data-sub="bore-cs">皿モミ</button>
  </div>
  <div class="panel active" id="bore-cb"><div class="table-wrap">
    ${makeTable(["呼び","座ぐり径","座ぐり深さ"], cbRows)}
  </div><div class="note">キャップボルト用座ぐり（mm）</div></div>
  <div class="panel" id="bore-cs"><div class="table-wrap">
    ${makeTable(["呼び","皿モミ径","角度"], csRows)}
  </div><div class="note">皿ねじ用皿モミ（mm）</div></div>`
}

const renderers = { pitch: renderPitch, clearance: renderClearance, tap: renderTap, nut: renderNut, washer: renderWasher, head: renderHead, bore: renderBore }

sections.forEach(({id, label}, i) => {
  const btn = document.createElement("button")
  btn.textContent = label
  btn.dataset.panel = id
  if (i === 0) btn.classList.add("active")
  mainTabs.appendChild(btn)

  const panel = document.createElement("div")
  panel.className = `panel${i === 0 ? " active" : ""}`
  panel.id = `panel-${id}`
  panel.innerHTML = renderers[id]()
  panels.appendChild(panel)
})

mainTabs.addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON") return
  mainTabs.querySelectorAll("button").forEach(b => b.classList.remove("active"))
  e.target.classList.add("active")
  panels.querySelectorAll(":scope > .panel").forEach(p => p.classList.remove("active"))
  document.getElementById(`panel-${e.target.dataset.panel}`).classList.add("active")
})

panels.addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON" || !e.target.dataset.sub) return
  const groupName = e.target.closest(".subtabs").dataset.group
  const parent = e.target.closest(".subtabs").parentElement
  parent.querySelectorAll(`.subtabs[data-group="${groupName}"] button`).forEach(b => b.classList.remove("active"))
  e.target.classList.add("active")
  parent.querySelectorAll(":scope > .panel").forEach(p => p.classList.remove("active"))
  document.getElementById(e.target.dataset.sub).classList.add("active")
})
</script>
</body>
</html>
